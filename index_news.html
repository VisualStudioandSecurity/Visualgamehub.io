<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Kovaliosky DeV - News Stream</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { 
            background-color: #0b0c10; 
            color: #45a29e; 
            font-family: 'Courier New', monospace; 
            padding: 20px; 
        }
        h1 { 
            color: #66fcf1; 
            text-shadow: 0 0 10px #66fcf1; 
            border-bottom: 2px solid #1f2833;
            padding-bottom: 10px;
        }
        .news-card { 
            background: #1f2833; 
            border-left: 4px solid #66fcf1; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 4px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .news-title { 
            color: #fff; 
            font-size: 1.1rem; 
            font-weight: bold; 
        }
        .news-desc { 
            color: #c5c6c7; 
            font-size: 0.9rem; 
            margin-top: 5px; 
        }
    </style>
</head>
<body>

    <h1>[ LIVE_NEWS_FEED_STREAM ]</h1>
    <div id="news-container">Aguardando pacotes de dados...</div>

    <script>
        // Conecta ao servidor Node que você acabou de ligar!
        const socket = io('http://localhost:3000');
        const container = document.getElementById('news-container');

        socket.on('news_update', (news) => {
            container.innerHTML = ''; // Limpa o feed anterior
            
            if(news.length === 0) {
                container.innerHTML = "Sem notícias novas no momento.";
                return;
            }

            news.forEach(article => {
                const div = document.createElement('div');
                div.className = 'news-card';
                div.innerHTML = `
                    <div class="news-title">${article.title}</div>
                    <div class="news-desc">${article.description || 'Sem descrição disponível.'}</div>
                `;
                container.appendChild(div);
            });
        });

        socket.on('connect', () => {
            console.log('Conectado ao WebSocket do servidor!');
        });
    </script>
</body>
</html>
