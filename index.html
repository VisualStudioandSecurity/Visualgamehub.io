        /* Estilo da Galeria */
        .gallery {
            display: grid;

            gap: 20px;
            margin-top: 30px;
        }

        .game-card {
            background: #21262d;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #30363d;

        }

        .game-card:hover { transform: translateY(-5px); border-color: var(--neon); }

        .game-card img { width: 100%; height: auto; border-bottom: 1px solid #30363d; }

        .game-card-body { padding: 15px; }

        .ads-container {
            margin: 30px 0; padding: 15px; background: #21262d;
            border-radius: 8px; border: 1px dashed #484f58; min-height: 100px;
        }

        .section-box { margin-top: 40px; padding: 20px; border-top: 1px solid #30363d; }

        footer { margin-top: 60px; padding: 40px 20px; border-top: 1px solid #30363d; }
        
        .system-log { 
            margin-bottom: 20px; padding: 15px; background: #000;
            border: 1px solid var(--neon); display: inline-block;
