    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #000; color: #fff; font-family: 'Orbitron', sans-serif; 
            width: 100vw; height: 100vh; overflow: hidden; position: relative;
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
        }
        img { pointer-events: none; -webkit-user-drag: none; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; color: #39FF14; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; cursor: pointer; transition: opacity 0.8s; }
        .typewriter { font-family: 'JetBrains Mono', monospace; display: inline-block; overflow: hidden; white-space: nowrap; border-right: 3px solid #39FF14; animation: typing 2.5s steps(40, end); }
        @keyframes typing { from { width: 0; } to { width: 100%; } }
        .screen { display: none; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; position: absolute; }
        .chroma { color: #39FF14; text-shadow: 0 0 10px #39FF14; margin-bottom: 20px; font-size: 1.2rem; letter-spacing: 3px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; margin-top: 20px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 25px; border-radius: 12px; transition: 0.5s; position: relative; }
        .card:hover { border-color: #333; transform: translateY(-5px); }
        .btn-main { width: 100%; max-width: 280px; padding: 15px; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; text-transform: uppercase; margin-top: 15px; }
        .btn-main:hover { background: #39FF14; box-shadow: 0 0 20px #39FF14; }
        .btn-nav { background: none; border: 1px solid #333; color: #888; padding: 12px; cursor: pointer; width: 100%; margin-top: 8px; font-size: 0.7rem; font-family: 'Orbitron'; transition: 0.3s; text-transform: uppercase; }
        .btn-nav:hover { border-color: #fff; color: #fff; }
        input { width: 100%; max-width: 250px; padding: 12px; background: #111; border: 1px solid #333; color: #fff; text-align: center; margin-bottom: 15px; font-family: 'Orbitron'; outline: none; }
        #t-box { font-family:'JetBrains Mono'; font-size:0.6rem; color:#888; text-align:left; height:70px; transition: 0.3s; }
    </style>
</head>
