<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Studio Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        body { 
            background: #000; 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        /* LOGIN */
        #login-page { text-align: center; display: block; }
        .box { 
            background: #0a0a0a; 
            padding: 40px; 
            border: 1px solid #1a1a1a; 
            border-radius: 10px; 
            width: 300px; 
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.1);
        }
        h1 { color: #39FF14; font-size: 1.2rem; margin-bottom: 25px; }
        input { 
            width: 100%; padding: 10px; margin: 10px 0; 
            background: #000; border: 1px solid #333; color: #39FF14; 
            border-radius: 5px; box-sizing: border-box;
        }
        .btn { 
            width: 100%; padding: 15px; background: #39FF14; 
            color: #000; border: none; font-weight: bold; 
            cursor: pointer; margin-top: 10px; font-family: 'Orbitron';
        }

        /* HUB */
        #hub-page { display: none; width: 90%; max-width: 1000px; flex-direction: column; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px; margin-top: 30px; 
        }
        .card { 
            background: #0a0a0a; border: 1px solid #1a1a1a; 
            padding: 20px; border-radius: 8px; text-align: center;
        }
        .card:hover { border-color: #39FF14; }
        .grad { height: 100px; border-radius: 5px; margin-bottom: 10px; }
        .btn-go { 
            background: transparent; border: 1px solid #39FF14; 
            color: #39FF14; padding: 8px; width: 100%; cursor: pointer; 
            font-family: 'Orbitron'; font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="box">
            <h1>VISUAL STUDIO GAMES</h1>
            <input type="text" placeholder="ID">
            <input type="password" placeholder="PASS">
            <button class="btn" onclick="document.getElementById('login-page').style.display='none'; document.getElementById('hub-page').style.display='flex';">
                ENTER SYSTEM
            </button>
        </div>
    </div>

    <div id="hub-page">
        <div style="border-bottom: 1px solid #1a1a1a; padding-bottom: 15px; display: flex; justify-content: space-between;">
