<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Studio & Security | Inteligência em Cibersegurança</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
            --header: #f0f6fc;
            --accent-green: #238636;
            --accent-blue: #58a6ff;
            --border: #30363d;
            --code-bg: #010409;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
        header { background-color: var(--card); padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Poppins', sans-serif; font-size: 2.2rem; color: var(--header); margin: 0; text-transform: uppercase; }
        .logo span { color: var(--accent-blue); }
        
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        
        .featured-article { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 50px; }
        .article-header-img { width: 100%; height: 320px; background-size: cover; background-position: center; }
        
        .article-body { padding: 40px; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; background: var(--accent-green); color: white; }
        .badge-apple { background: #555; }

        h1.post-title { font-size: 2.2rem; color: var(--header); margin-top: 0; line-height: 1.2; }
        .meta { font-size: 0.85rem; color: #8b949e; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        
        .post-content h3 { color: var(--accent-blue); margin-top: 30px; border-left: 4px solid var(--accent-blue); padding-left: 15px; }
        .post-content p { margin-bottom: 20px; text-align: justify; }
