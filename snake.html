<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Snake | Visual Studio Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        
        body {
            background-color: #050505;
            color: #39FF14;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 { text-shadow: 0 0 15px #39FF14; margin: 0 0 10px 0; letter-spacing: 3px; }
        .score-board { font-size: 1.2rem; color: white; }
        #score { color: #d4008d; font-size: 1.5rem; text-shadow: 0 0 10px #d4008d; }

        canvas {
            background-color: #0a0a0a;
            border: 2px solid #222;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.2);
            border-radius: 5px;
        }

        .controls { margin-top: 20px; color: #555; font-family: sans-serif; font-size: 0.8rem; }
        
        .btn-back {
            margin-top: 20px;
            background: transparent;
            border: 1px solid #39FF14;
            color: #39FF14;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Orbitron';
            transition: 0.3s;
        }
        
        .btn-back:hover { background: #39FF14; color: black; box-shadow: 0 0 15px #39FF14; }
    </style>
</head>
<body>

    <div class="header">
        <h1>CYBER SNAKE</h1>
        <div class="score-board">SCORE: <span id="score">0</span></div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls">USE AS SETAS DO TECLADO PARA MOVER</div>
    <button class="btn-back" onclick="window.location.href='index.html'">SAIR DO JOGO</button>

    <script>
        // Lógica Sênior: Manipulação direta de Canvas e Orientação a Objetos simplificada
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let velocity = {x: 0, y: 0};
        let food = {x: 15, y: 15};
        let score = 0;
        let speed = 100; // FPS Control

        function gameLoop() {
            update();
            draw();
            setTimeout(gameLoop, speed);
        }

        function update() {
            // Movimentação
            const head = {x: snake[0].x + velocity.x, y: snake[0].y + velocity.y};

            // Game Over (Colisão com paredes)
            if(head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return resetGame();
            }

            // Game Over (Colisão com o próprio corpo)
            for(let i = 0; i < snake.length; i++) {
                if(head.x === snake[i].x && head.y === snake[i].y && snake.length > 1) {
                    return resetGame();
                }
            }

            snake.unshift(head); // Adiciona nova cabeça

            // Comer a comida
            if(head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById("score").innerText = score;
                speed = Math.max(40, speed - 2); // Aumenta a dificuldade dinamicamente
                placeFood();
            } else {
                snake.pop(); // Remove a cauda se não comeu
            }
        }

        function draw() {
            // Limpa o frame
            ctx.fillStyle = "#0a0a0a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Efeito Neon da Cobrinha
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#39FF14";
            ctx.fillStyle = "#39FF14";
            snake.forEach(segment => {
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
            });

            // Efeito Neon da Comida
            ctx.shadowColor = "#d4008d";
            ctx.fillStyle = "#d4008d";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
            
            ctx.shadowBlur = 0; // Reseta o brilho
        }

        function placeFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            // Garante que a comida não nasça dentro da cobra
            if(snake.some(s => s.x === food.x && s.y === food.y)) placeFood();
        }

        function resetGame() {
            snake = [{x: 10, y: 10}];
            velocity = {x: 0, y: 0};
            score = 0;
            speed = 100;
            document.getElementById("score").innerText = score;
            placeFood();
        }

        // Sistema de Controle (Impede movimento reverso instantâneo)
        window.addEventListener("keydown", e => {
            switch(e.key) {
                case "ArrowUp": if(velocity.y !== 1) velocity = {x: 0, y: -1}; break;
                case "ArrowDown": if(velocity.y !== -1) velocity = {x: 0, y: 1}; break;
                case "ArrowLeft": if(velocity.x !== 1) velocity = {x: -1, y: 0}; break;
                case "ArrowRight": if(velocity.x !== -1) velocity = {x: 1, y: 0}; break;
            }
        });

        // Inicia a Engine
        placeFood();
        gameLoop();
    </script>
</body>
</html>
