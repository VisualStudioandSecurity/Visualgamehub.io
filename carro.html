<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Neon Drift | Visual Studio Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        body { background: #050505; color: white; font-family: 'Orbitron'; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { background: #0a0a0a; border: 2px solid #333; box-shadow: 0 0 40px rgba(212, 0, 141, 0.2); border-radius: 10px; }
        #score { color: #39FF14; font-size: 2rem; margin-bottom: 10px; }
        .btn { margin-top: 20px; background: transparent; border: 1px solid #d4008d; color: #d4008d; padding: 10px 25px; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s; }
        .btn:hover { background: #d4008d; color: white; }
    </style>
</head>
<body>
    <div id="score">0m</div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <button class="btn" onclick="window.location.href='index.html'">BACK TO HUB</button>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    let score = 0, gameActive = true, roadY = 0;
    const player = { x: 175, y: 500, w: 50, h: 80, color: "#d4008d", targetX: 175 };
    const enemies = [];

    function createEnemy() {
        const lanes = [50, 150, 250];
        enemies.push({ x: lanes[Math.floor(Math.random()*3)], y: -100, w: 50, h: 80, speed: 4 + Math.random()*4, color: "#39FF14" });
    }

    function update() {
        if (!gameActive) return;
        score++;
        document.getElementById("score").innerText = score + "m";
        player.x += (player.targetX - player.x) * 0.2;
        roadY = (roadY + 10) % 40;
        if (score % 50 === 0) createEnemy();
        enemies.forEach((en, i) => {
            en.y += en.speed;
            if (player.x < en.x + en.w && player.x + player.w > en.x && player.y < en.y + en.h && player.y + player.h > en.y) {
                gameActive = false; alert("GAME OVER!"); location.reload();
            }
            if (en.y > canvas.height) enemies.splice(i, 1);
        });
    }

    function draw() {
        ctx.fillStyle = "#0a0a0a"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "#222"; ctx.setLineDash([20, 20]); ctx.lineDashOffset = -roadY;
        for(let i=1; i<4; i++) { ctx.beginPath(); ctx.moveTo(i*100, 0); ctx.lineTo(i*100, canvas.height); ctx.stroke(); }
        ctx.fillStyle = player.color; ctx.shadowBlur = 15; ctx.shadowColor = player.color;
        ctx.fillRect(player.x, player.y, player.w, player.h);
        enemies.forEach(en => { ctx.fillStyle = en.color; ctx.shadowColor = en.color; ctx.fillRect(en.x, en.y, en.w, en.h); });
        ctx.shadowBlur = 0; requestAnimationFrame(() => { update(); draw(); });
    }

    window.addEventListener("keydown", e => {
        if (e.key === "ArrowLeft" && player.targetX > 50) player.targetX -= 100;
        if (e.key === "ArrowRight" && player.targetX < 250) player.targetX += 100;
    });
    draw();
</script>
</body>
</html>
